<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe - First to 5 Wins</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px 35px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .scoreboard {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-gap: 12px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .cell {
      width: 90px;
      height: 90px;
      border-radius: 15px;
      background: linear-gradient(145deg, #ffffff, #d1d9e6);
      box-shadow: 5px 5px 15px rgba(0,0,0,0.3), -5px -5px 15px rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #333;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .cell:hover {
      transform: translateY(-3px);
      box-shadow: 8px 8px 20px rgba(0,0,0,0.4);
    }

    .status {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Tic Tac Toe</h1>
    <div class="scoreboard">
      You: <span id="scoreX">0</span> | Computer: <span id="scoreO">0</span>
    </div>

    <div class="board" id="board"></div>
    <div class="status" id="status">Your turn</div>
    <button onclick="resetGame()">Reset Match</button>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');

    let board = Array(9).fill(null);
    let player = 'X';
    let ai = 'O';
    let gameActive = true;
    let scoreX = 0;
    let scoreO = 0;

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((cell, i) => {
        const div = document.createElement('div');
        div.classList.add('cell');
        div.textContent = cell || '';
        div.addEventListener('click', () => playerMove(i));
        boardEl.appendChild(div);
      });
    }

    function playerMove(index) {
      if (!gameActive || board[index]) return;

      board[index] = player;
      renderBoard();

      if (checkWinner(player)) {
        scoreX++;
        scoreXEl.textContent = scoreX;
        endRound("You win this round 😎");
        return;
      }

      if (!board.includes(null)) {
        endRound("Draw 🤝");
        return;
      }

      statusEl.textContent = "Computer thinking...";
      setTimeout(aiMove, 500);
    }

    function aiMove() {
      let empty = board.map((v,i)=>v?null:i).filter(v=>v!==null);
      let move = empty[Math.floor(Math.random()*empty.length)];
      board[move] = ai;
      renderBoard();

      if (checkWinner(ai)) {
        scoreO++;
        scoreOEl.textContent = scoreO;
        endRound("Computer wins 🤖");
        return;
      }

      if (!board.includes(null)) {
        endRound("Draw 🤝");
        return;
      }

      statusEl.textContent = "Your turn";
    }

    function checkWinner(p) {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      return wins.some(([a,b,c]) =>
        board[a] === p && board[b] === p && board[c] === p
      );
    }

    function endRound(message) {
      statusEl.textContent = message;
      gameActive = false;

      if (scoreX === 5 || scoreO === 5) {
        setTimeout(() => {
          alert(scoreX === 5 ? "🏆 You win the match!" : "💀 Computer wins the match!");
          resetMatch();
        }, 300);
      } else {
        setTimeout(resetBoard, 1200);
      }
    }

    function resetBoard() {
      board = Array(9).fill(null);
      gameActive = true;
      statusEl.textContent = "Your turn";
      renderBoard();
    }

    function resetMatch() {
      scoreX = 0;
      scoreO = 0;
      scoreXEl.textContent = 0;
      scoreOEl.textContent = 0;
      resetBoard();
    }

    function resetGame() {
      resetMatch();
    }

    renderBoard();
  </script>
</body>
</html>
